<!DOCTYPE html>
<html>
<head>
  <title>Books - Library System</title>
  <link rel="stylesheet" href="../static/style.css">
</head>

<body>

  <div class="navbar">
    <h2>📚 Library System</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="books.html">Books</a>
    </div>
  </div>

  <div class="container">

    <h2>Available Books</h2>

    <!-- Search bar -->
    <input type="text" placeholder="Search books..." class="search-box">

    <!-- Books Table -->
    <table class="books-table">

      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>
        <th>Language</th>
        <th>Status</th>
        <th>Action</th>
      </tr>

      <tr>
        <td>1</td>
        <td>Python Basics</td>
        <td>John Doe</td>
        <td>2022</td>
        <td>English</td>
        <td><span class="available">Available</span></td>
        <td><button class="btn-small">Borrow</button></td>
      </tr>

      <tr>
        <td>2</td>
        <td>Web Design</td>
        <td>Jane Smith</td>
        <td>2021</td>
        <td>English</td>
        <td><span class="unavailable">Issued</span></td>
        <td><button class="btn-small disabled">Return</button></td>
      </tr>

    </table>

  </div>

</body>
</html>
